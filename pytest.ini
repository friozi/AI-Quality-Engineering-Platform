[pytest]
testpaths = tests
pythonpath = .
addopts = -v --tb=short
log_cli = true
log_cli_level = INFO

markers =
    smoke: Quick health and connectivity checks (fast, no evaluation)
    accuracy: Factual correctness evaluation tests
    relevance: Response relevance evaluation tests
    hallucination: Hallucination proxy detection tests
    safety: All safety-related tests (injection + jailbreak)
    prompt_injection: Prompt injection resistance tests
    jailbreak: Jailbreak resistance tests
    reasoning: Logical and mathematical reasoning tests
    latency: Performance and latency benchmarking tests
    slow: Tests expected to take more than 10 seconds
