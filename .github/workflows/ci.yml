name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Offline tests ────────────────────────────────────────────────────────
  # Runs on every push and PR. No LLM server required.
  # Covers: reporters (JSON/CSV/HTML), metrics aggregation, schema validation.
  offline-tests:
    name: Offline Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify all public imports resolve
        run: |
          python -c "
          from src.clients import BaseClient, LocalLLMClient, LLMError
          from src.evaluators import (
              AccuracyEvaluator, RelevanceEvaluator, HallucinationEvaluator,
              PromptInjectionEvaluator, JailbreakEvaluator, LatencyEvaluator,
              ReasoningEvaluator,
          )
          from src.reporters import JSONReporter, CSVReporter, HTMLReporter, ReportRunner
          from src.schemas import TestCase, EvaluationResult, EvalTier, RiskLevel
          from src.utils import Config, DatasetLoader
          print('All imports OK')
          "

      - name: Run offline test suite
        run: pytest tests/test_phase5_reporters.py -v --tb=short

  # ── LLM integration tests ────────────────────────────────────────────────
  # Runs on GitHub-hosted Linux, connecting to your local Gemma via Tailscale.
  #
  # Prerequisites:
  #   1. Install Tailscale on the Mac running the LLM:
  #        brew install tailscale && sudo tailscale up
  #   2. Create a Tailscale OAuth client at tailscale.com/admin/settings/oauth
  #      with permission: devices:write
  #   3. Add GitHub repository secrets:
  #        TS_OAUTH_CLIENT_ID  — Tailscale OAuth client ID
  #        TS_OAUTH_SECRET     — Tailscale OAuth client secret
  #        LLM_BASE_URL        — http://<tailscale-ip>:1234
  #        LLM_MODEL_KEY       — google/gemma-4-e2b
  llm-integration:
    name: LLM Integration Tests
    runs-on: ubuntu-latest
    needs: offline-tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-client-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for LLM server to be reachable
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
        run: |
          echo "Checking LLM server at $LLM_BASE_URL..."
          for i in $(seq 1 10); do
            if curl -sf "$LLM_BASE_URL/api/v1/models" > /dev/null 2>&1; then
              echo "LLM server is up."
              exit 0
            fi
            echo "Attempt $i/10 — retrying in 5s..."
            sleep 5
          done
          echo "LLM server did not respond after 50s. Aborting."
          exit 1

      - name: Run full test suite against live LLM
        env:
          BASE_URL: ${{ secrets.LLM_BASE_URL }}
          DEFAULT_MODEL_KEY: ${{ secrets.LLM_MODEL_KEY }}
          REPORT_DIR: reports
        run: pytest -v --tb=short

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports-${{ github.sha }}
          path: reports/
          retention-days: 30
